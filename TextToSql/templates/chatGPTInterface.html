<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatGPT Interface</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
      color: #212529;
    }
    .sidebar {
      height: 100vh;
      overflow-y: auto;
      background-color: #f8f9fa;
      padding: 15px;
      border-right: 1px solid #dee2e6;
    }
    .chat-box {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .messages {
      flex-grow: 1;
      overflow-y: auto;
      padding: 15px;
      background-color: #ffffff;
    }
    .message-input {
      display: flex;
      gap: 10px;
      padding: 10px;
      background-color: #ffffff;
      align-items: center;
      border-top: 1px solid #dee2e6;
    }
    .visualization {
      background-color: #f8f9fa;
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 2rem;
      border: 1px solid #dee2e6;
    }
    .form-check-label {
      color: #212529;
    }
    .form-check-input:checked {
      background-color: #0d6efd;
      border-color: #0d6efd;
    }
    .js-plotly-plot .plotly .modebar {
      background-color: transparent !important;
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <div class="col-md-3 sidebar">
        <h5>Tables</h5>
        <form id="queryForm">
          <div id="tableList">
            {% for table in tables %}
            <div class="form-check">
              <input class="form-check-input" type="radio" name="table_name" value="{{ table }}" id="{{ table }}">
              <label class="form-check-label" for="{{ table }}">{{ table }}</label>
            </div>
            {% endfor %}
          </div>
        </form>
      </div>

      <!-- Chat Box -->
      <div class="col-md-9 chat-box">
        <div class="messages" id="messages">
          {% if plot %}
          <div class="visualization">
            <h5 class="mb-3">Query Visualization</h5>
            <div id="plotDiv">
              {{ plot|safe }}
            </div>
          </div>
          {% endif %}
        </div>
        <div class="message-input">
          <label for="fileUpload" class="btn btn-outline-secondary">
            <i class="bi bi-upload"></i> Upload
          </label>
          <input type="file" id="fileUpload" class="form-control d-none">
          <button class="btn btn-primary" id="uploadButton">Submit</button>
          <div id="loadingIcon" class="spinner-border text-primary d-none" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <input type="text" id="messageInput" class="form-control" placeholder="Type a message...">
          <button class="btn btn-primary" id="sendButton">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function updatePlotTheme() {
      const plots = document.getElementsByClassName('js-plotly-plot');
      for (let plot of plots) {
        Plotly.relayout(plot, {
          paper_bgcolor: '#ffffff',
          plot_bgcolor: '#ffffff',
          font: {
            color: '#212529'
          },
          xaxis: {
            gridcolor: '#dee2e6',
            zerolinecolor: '#dee2e6'
          },
          yaxis: {
            gridcolor: '#dee2e6',
            zerolinecolor: '#dee2e6'
          }
        });
      }
    }

    const uploadButton = document.getElementById('uploadButton');
    const fileUpload = document.getElementById('fileUpload');
    const loadingIcon = document.getElementById('loadingIcon');
    const messages = document.getElementById('messages');
    const sendButton = document.getElementById('sendButton');
    const messageInput = document.getElementById('messageInput');

    uploadButton.addEventListener('click', () => {
      const file = fileUpload.files[0];
      if (file) {
        const formData = new FormData();
        formData.append('file', file);
        loadingIcon.classList.remove('d-none');
        fetch('/upload', {
          method: 'POST',
          body: formData
        })
        .then(response => response.json())
        .then(data => {
          loadingIcon.classList.add('d-none');
          if (data.success) {
            alert(`File uploaded successfully: ${data.table_name}`);
            location.reload();
          } else {
            alert(data.error);
          }
        });
      } else {
        alert('Please select a file to upload.');
      }
    });

    sendButton.addEventListener('click', () => {
      const query = messageInput.value.trim();
      const tableName = document.querySelector('input[name="table_name"]:checked')?.value;
      if (query && tableName) {
        loadingIcon.classList.remove('d-none');
        fetch('/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ query, table_name: tableName })
        })
        .then(response => response.json())
        .then(data => {
          loadingIcon.classList.add('d-none');
          if (data.success) {
            const vizDiv = document.createElement('div');
            vizDiv.className = 'visualization';
            vizDiv.innerHTML = `<h5 class="mb-3">Query: ${query}</h5>`;

            const wrapper = document.createElement('div');
            wrapper.innerHTML = data.plot;

            const plotDiv = wrapper.querySelector('.plotly-graph-div');
            if (plotDiv) {
              vizDiv.appendChild(plotDiv.cloneNode(true));
            }

            messages.appendChild(vizDiv);

            const scripts = wrapper.querySelectorAll('script');
            scripts.forEach(script => {
              const newScript = document.createElement('script');
              if (script.src) {
                newScript.src = script.src;
              } else {
                newScript.textContent = script.textContent;
              }
              document.body.appendChild(newScript);
            });

            setTimeout(updatePlotTheme, 300);
            messageInput.value = '';
            messages.scrollTop = messages.scrollHeight;
          } else {
            const reasonDiv = document.createElement('div');
            reasonDiv.className = 'alert alert-info';
            reasonDiv.innerHTML = marked.parse(data.error);
            messages.appendChild(reasonDiv);
            messages.scrollTop = messages.scrollHeight;
          }
        });
      } else {
        alert('Please select a table and enter a query.');
      }
    });

    document.addEventListener('DOMContentLoaded', function() {
      if (document.getElementsByClassName('js-plotly-plot').length > 0) {
        setTimeout(updatePlotTheme, 200);
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
